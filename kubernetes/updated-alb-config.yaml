apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mcp-gateway-ingress
  namespace: mcp-gateway
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    alb.ingress.kubernetes.io/certificate-arn: <certificate-arn>
    alb.ingress.kubernetes.io/actions.ssl-redirect: '{"Type": "redirect", "RedirectConfig": {"Protocol": "HTTPS", "Port": "443", "StatusCode": "HTTP_301"}}'
    alb.ingress.kubernetes.io/healthcheck-path: /login
    alb.ingress.kubernetes.io/healthcheck-protocol: HTTP
    alb.ingress.kubernetes.io/success-codes: "200,302,307,401,404,405"
    alb.ingress.kubernetes.io/security-groups: sg-087c93faf3acbcf13
    # Add this annotation to enable pod readiness gate
    alb.ingress.kubernetes.io/target-node-labels: eks.amazonaws.com/compute-type=fargate
spec:
  rules:
  - host: mcp-test.v2n2x.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: mcp-gateway-registry-new
            port:
              number: 80
---
apiVersion: v1
kind: Service
metadata:
  name: mcp-gateway-registry-new
  namespace: mcp-gateway
spec:
  selector:
    app: mcp-gateway-registry-new
  ports:
  - port: 80
    targetPort: 7860
    protocol: TCP
  type: NodePort