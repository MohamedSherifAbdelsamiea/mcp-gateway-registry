apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mcp-gateway-ingress
  namespace: mcp-gateway
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:us-east-1:338293206254:certificate/f0f70158-6f58-42e7-a608-884331fd8c03
    alb.ingress.kubernetes.io/actions.ssl-redirect: '{"Type": "redirect", "RedirectConfig": {"Protocol": "HTTPS", "Port": "443", "StatusCode": "HTTP_301"}}'
    alb.ingress.kubernetes.io/healthcheck-path: /login
    alb.ingress.kubernetes.io/healthcheck-protocol: HTTP
    alb.ingress.kubernetes.io/success-codes: "200,302,307,401,404,405"
    alb.ingress.kubernetes.io/security-groups: sg-087c93faf3acbcf13
spec:
  rules:
  - host: mcp-test.v2n2x.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: mcp-gateway-registry
            port:
              number: 80
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: aws-load-balancer-controller-config
  namespace: kube-system
data:
  targetGroupAttributes: |
    load_balancing.algorithm.type=least_outstanding_requests,
    deregistration_delay.timeout_seconds=30,
    stickiness.enabled=true,
    stickiness.type=lb_cookie,
    stickiness.lb_cookie.duration_seconds=86400