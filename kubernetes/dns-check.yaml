apiVersion: v1
kind: Pod
metadata:
  name: dns-check
  namespace: mcp-gateway
spec:
  containers:
  - name: dns-check
    image: busybox:1.28
    command:
      - sleep
      - "3600"
    resources:
      requests:
        memory: "64Mi"
        cpu: "100m"
      limits:
        memory: "128Mi"
        cpu: "200m"
  restartPolicy: Always