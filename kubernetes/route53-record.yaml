apiVersion: v1
kind: ConfigMap
metadata:
  name: route53-dns-config
  namespace: mcp-gateway
data:
  domain: "mcp-test.v2n2x.com"
  type: "CNAME"
  ttl: "300"
  value: "mcp-gateway-alb-1589071366.us-east-1.elb.amazonaws.com"
---
# This is a reference for the AWS CLI command to create/update the Route53 record
# Not directly applied with kubectl
apiVersion: v1
kind: ConfigMap
metadata:
  name: route53-update-command
  namespace: mcp-gateway
data:
  update_command: |
    aws route53 change-resource-record-sets \
      --hosted-zone-id YOUR_HOSTED_ZONE_ID \
      --change-batch '{
        "Changes": [
          {
            "Action": "UPSERT",
            "ResourceRecordSet": {
              "Name": "mcp-test.v2n2x.com",
              "Type": "CNAME",
              "TTL": 300,
              "ResourceRecords": [
                {
                  "Value": "mcp-gateway-alb-1589071366.us-east-1.elb.amazonaws.com"
                }
              ]
            }
          }
        ]
      }'