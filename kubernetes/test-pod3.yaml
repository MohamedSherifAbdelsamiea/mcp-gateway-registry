apiVersion: v1
kind: Pod
metadata:
  name: efs-test-pod3
  namespace: mcp-gateway
spec:
  containers:
  - name: efs-test
    image: busybox
    command: ["/bin/sh"]
    args: ["-c", "echo 'Test file for EFS' > /data/test3.txt && ls -la /data && cat /data/test3.txt && sleep 10"]
    volumeMounts:
    - name: efs-volume
      mountPath: /data
  volumes:
  - name: efs-volume
    persistentVolumeClaim:
      claimName: mcp-gateway-registry-pvc