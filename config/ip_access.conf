# IP Access Configuration for MCP Gateway Registry
# This file configures direct IP access to the gateway

# IP Address Configuration
ip_address: 3.232.159.45

# Security Group Configuration
# Ensure this IP is allowed in the security group
security_group_rules:
  - type: ingress
    protocol: tcp
    port_range: 80-80
    source: 0.0.0.0/0
    description: "HTTP access"
  - type: ingress
    protocol: tcp
    port_range: 443-443
    source: 0.0.0.0/0
    description: "HTTPS access"

# SSL Certificate Configuration
ssl:
  # For IP access, we need to ensure the certificate includes the IP in SAN
  use_self_signed: true
  generate_command: |
    openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
      -keyout /etc/ssl/private/privkey.pem \
      -out /etc/ssl/certs/fullchain.pem \
      -subj "/CN=mcp-gateway" \
      -addext "subjectAltName = IP:3.232.159.45,DNS:localhost,DNS:mcpgateway"