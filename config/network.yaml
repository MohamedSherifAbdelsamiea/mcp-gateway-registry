---
# MCP Gateway Registry Network Configuration
# This file contains all network-related settings for the MCP Gateway Registry

# Main Application Settings
app:
  host: 0.0.0.0
  port: 7860
  base_url: https://mcp-test.v2n2x.com
  websocket_path: /ws/health_status

# Proxy Configuration
proxy:
  # Nginx configuration
  nginx:
    http_port: 80
    https_port: 443
    server_names:
      - mcp-test.v2n2x.com
      - mcpgateway
      - localhost
      - mcpgateway.ddns.net
      - 3.232.159.45
    ssl:
      enabled: true
      cert_path: /etc/ssl/certs/fullchain.pem
      key_path: /etc/ssl/private/privkey.pem
      protocols:
        - TLSv1.2
        - TLSv1.3
      ciphers: ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384
    proxy_settings:
      buffer_size: 16k
      buffers: 4 16k
      read_timeout: 3600s

# AWS Infrastructure Settings
aws:
  region: us-east-1
  eks:
    cluster_name: mcp-gateway-eks-cluster
    fargate_profile: mcp-gateway-fargate
    namespace: mcp-gateway
  ecr:
    repository: mcp-gateway-registry
  alb:
    name: mcp-gateway-alb
    dns_name: mcp-gateway-alb-1589071366.us-east-1.elb.amazonaws.com
    target_group_arn: arn:aws:elasticloadbalancing:us-east-1:338293206254:targetgroup/mcp-gateway-tg/18ec9cffd9008a39
    security_group: sg-087c93faf3acbcf13
    certificate_arn: arn:aws:acm:us-east-1:338293206254:certificate/f0f70158-6f58-42e7-a608-884331fd8c03
    health_check:
      path: /login
      protocol: HTTP
      success_codes: "200,302,307,401,404,405"
      interval: 30
      timeout: 5
      healthy_threshold: 2
      unhealthy_threshold: 3
    target_group_attributes:
      load_balancing_algorithm: least_outstanding_requests
      deregistration_delay: 30
      stickiness:
        enabled: true
        type: lb_cookie
        duration: 86400

# Kubernetes Configuration
kubernetes:
  deployment:
    name: mcp-gateway-registry-new
    replicas: 2
    resources:
      requests:
        cpu: 0.5
        memory: 1Gi
      limits:
        cpu: 1
        memory: 2Gi
  service:
    name: mcp-gateway-registry
    type: NodePort
    port: 80
    target_port: 7860
  ingress:
    name: mcp-gateway-ingress
    class: alb
    scheme: internet-facing
    target_type: ip
    listen_ports:
      - http: 80
      - https: 443

# DNS Configuration
dns:
  domain: mcp-test.v2n2x.com
  type: CNAME
  value: mcp-gateway-alb-1589071366.us-east-1.elb.amazonaws.com
  ttl: 300

# API Endpoints Network Configuration
api:
  authentication:
    login_path: /login
    logout_path: /logout
    session_expiry_hours: 8
  server_management:
    register_path: /register
    toggle_path: /toggle/{service_path}
    edit_path: /edit/{service_path}
  endpoints:
    server_details: /api/server_details/{service_path}
    tools: /api/tools/{service_path}
    refresh: /api/refresh/{service_path}

# External Services Configuration
external_services:
  tsbedrock:
    path: /tsbedrock/
    target: https://hwfo2k8szg.execute-api.us-east-1.amazonaws.com/prod/
    host_header: hwfo2k8szg.execute-api.us-east-1.amazonaws.com

# Security Settings
security:
  cors:
    allowed_origins:
      - https://mcp-test.v2n2x.com
      - https://3.232.159.45
    allowed_methods:
      - GET
      - POST
      - OPTIONS
    allowed_headers:
      - Content-Type
      - Authorization
    max_age: 3600
  rate_limiting:
    enabled: true
    requests_per_minute: 60
    burst: 10