name: Deploy MCP Gateway Registry

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1
      
      - name: Fix mixed content issues
        run: |
          # Ensure all URLs use HTTPS instead of HTTP
          find ./registry/templates -type f -name "*.html" -exec sed -i 's|http://mcp-test.v2n2x.com|https://mcp-test.v2n2x.com|g' {} \;
          echo "Fixed mixed content issues in HTML templates"
      
      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: mcp-gateway-registry
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
      
      - name: Update Kubernetes deployment
        run: |
          aws eks update-kubeconfig --name mcp-gateway-eks-cluster --region us-east-1
          kubectl set image deployment/mcp-gateway-registry-new mcp-gateway-registry=${{ steps.login-ecr.outputs.registry }}/mcp-gateway-registry:${{ github.sha }} -n mcp-gateway