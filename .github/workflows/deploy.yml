name: Deploy to EKS and Update Route53

on:
  push:
    branches:
      - Adding-uvx-support

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials for EKS account
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: arn:aws:iam::338293206254:role/GitHubActionsEKSRole
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build and push image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: mcp-gateway-registry
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # Repository already created manually: 338293206254.dkr.ecr.us-east-1.amazonaws.com/mcp-gateway-registry
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      # EKS cluster needs to be created first
      # Skipping EKS deployment steps for now
      - name: Set placeholder service address
        run: |
          echo "SERVICE_ADDRESS=placeholder.example.com" >> $GITHUB_ENV
          echo "Image successfully built and pushed to ECR: ${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY:${{ github.sha }}"
          echo "To deploy to EKS, you need to create an EKS cluster first."
          echo "You can create one with: aws eks create-cluster --name mcp-gateway-eks-cluster --role-arn <EKS-SERVICE-ROLE-ARN> --resources-vpc-config subnetIds=<SUBNET-IDS>,securityGroupIds=<SECURITY-GROUP-IDS>"

      - name: Configure AWS credentials for Route53 account
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: arn:aws:iam::836966548078:role/GitHubActionsRoute53Role
          aws-region: us-east-1

      - name: Update Route53 record
        run: |
          aws route53 change-resource-record-sets --hosted-zone-id Z00677396IM7D3SZ8WND --change-batch '{
            "Changes": [
              {
                "Action": "UPSERT",
                "ResourceRecordSet": {
                  "Name": "mcp-test.v2n2x.com",
                  "Type": "CNAME",
                  "TTL": 300,
                  "ResourceRecords": [
                    {
                      "Value": "${{ env.SERVICE_ADDRESS }}"
                    }
                  ]
                }
              }
            ]
          }'
          
      - name: Monitor deployment
        run: |
          echo "Deployment completed. Monitoring resources..."
          
          # Check pod status
          kubectl get pods -n mcp-gateway
          
          # Check service status
          kubectl get svc -n mcp-gateway
          
          # Check ingress status
          kubectl get ingress -n mcp-gateway
          
          # Check certificate status
          kubectl get certificates -n mcp-gateway
          
          echo "Deployment URL: https://mcp-test.v2n2x.com"