name: Deploy to EKS and Update Route53

on:
  push:
    branches:
      - Adding-uvx-support

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials for EKS account
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: arn:aws:iam::338293206254:role/GitHubActionsEKSRole
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Create ECR repository if it doesn't exist
        run: |
          aws ecr describe-repositories --repository-names mcp-gateway-registry || aws ecr create-repository --repository-name mcp-gateway-registry
        continue-on-error: true

      - name: Build and push image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: mcp-gateway-registry
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name your-eks-cluster-name

      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: 'v3.10.0'

      - name: Clone Distributed Training and Inference on EKS repo
        run: |
          git clone https://github.com/aws-samples/distributed-training-and-inference-on-eks.git
          cd distributed-training-and-inference-on-eks

      - name: Install cert-manager
        run: |
          kubectl apply -f https://github.com/cert-manager/cert-manager/releases/download/v1.12.0/cert-manager.yaml
          
          # Wait for cert-manager to be ready
          kubectl wait --for=condition=available --timeout=300s deployment/cert-manager-webhook -n cert-manager
          
          # Create ClusterIssuer for Let's Encrypt
          cat <<EOF | kubectl apply -f -
          apiVersion: cert-manager.io/v1
          kind: ClusterIssuer
          metadata:
            name: letsencrypt-prod
          spec:
            acme:
              server: https://acme-v02.api.letsencrypt.org/directory
              email: your-email@example.com
              privateKeySecretRef:
                name: letsencrypt-prod
              solvers:
              - http01:
                  ingress:
                    class: nginx
          EOF

      - name: Deploy using Helm chart
        run: |
          cd distributed-training-and-inference-on-eks
          
          # Install/upgrade the Helm chart
          helm install --debug mcp-gateway-registry \
            charts/machine-learning/serving/generic-server \
            -f examples/agentic/mcp-gateway-registry/server.yaml \
            --set="image.repository=${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY" \
            --set="image.tag=${{ github.sha }}" \
            --set="admin_user=admin" \
            --set="admin_password=${{ secrets.ADMIN_PASSWORD || '123' }}" \
            --set="polygon_api_key=${{ secrets.POLYGON_API_KEY || 'EkzPR2VJ_3lSH1xloFBv4cDZJUGMpMLn' }}" \
            --set="ssl_enabled=true" \
            --set="ssl_certs=/etc/ssl/certs/tls.crt" \
            --set="ssl_private=/etc/ssl/private/tls.key" \
            --set="ingress.enabled=true" \
            --set="ingress.hosts[0].host=mcp-test.v2n2x.com" \
            --set="ingress.hosts[0].paths[0].path=/" \
            --set="ingress.hosts[0].paths[0].pathType=Prefix" \
            --set="ingress.annotations.cert-manager\.io/cluster-issuer=letsencrypt-prod" \
            --set="ingress.annotations.kubernetes\.io/ingress\.class=nginx" \
            --set="ingress.tls[0].secretName=mcp-test-tls" \
            --set="ingress.tls[0].hosts[0]=mcp-test.v2n2x.com" \
            --set="service.type=LoadBalancer" \
            --namespace mcp-gateway \
            --create-namespace

      - name: Get EKS Service External IP/Hostname
        id: get-service-ip
        run: |
          echo "Waiting for service to get external address..."
          external_address=""
          while [ -z "$external_address" ]; do
            echo "Waiting for external address..."
            external_address=$(kubectl get svc mcp-gateway-registry -n mcp-gateway -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
            # If hostname is empty, try IP (depends on cloud provider)
            if [ -z "$external_address" ]; then
              external_address=$(kubectl get svc mcp-gateway-registry -n mcp-gateway -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
            fi
            [ -z "$external_address" ] && sleep 10
          done
          echo "SERVICE_ADDRESS=$external_address" >> $GITHUB_ENV

      - name: Configure AWS credentials for Route53 account
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: arn:aws:iam::836966548078:role/GitHubActionsRoute53Role
          aws-region: us-east-1

      - name: Update Route53 record
        run: |
          aws route53 change-resource-record-sets --hosted-zone-id Z00677396IM7D3SZ8WND --change-batch '{
            "Changes": [
              {
                "Action": "UPSERT",
                "ResourceRecordSet": {
                  "Name": "mcp-test.v2n2x.com",
                  "Type": "CNAME",
                  "TTL": 300,
                  "ResourceRecords": [
                    {
                      "Value": "${{ env.SERVICE_ADDRESS }}"
                    }
                  ]
                }
              }
            ]
          }'
          
      - name: Monitor deployment
        run: |
          echo "Deployment completed. Monitoring resources..."
          
          # Check pod status
          kubectl get pods -n mcp-gateway
          
          # Check service status
          kubectl get svc -n mcp-gateway
          
          # Check ingress status
          kubectl get ingress -n mcp-gateway
          
          # Check certificate status
          kubectl get certificates -n mcp-gateway
          
          echo "Deployment URL: https://mcp-test.v2n2x.com"