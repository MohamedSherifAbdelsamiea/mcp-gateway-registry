name: Deploy to EKS and Update Route53

on:
  push:
    branches:
      - Adding-uvx-support

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials for EKS account
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: arn:aws:iam::338293206254:role/GitHubActionsEKSRole
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build and push image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: mcp-gateway-registry
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # Repository already created manually: 338293206254.dkr.ecr.us-east-1.amazonaws.com/mcp-gateway-registry
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Update kubeconfig
        run: |
          # Update kubeconfig to connect to the cluster
          aws eks update-kubeconfig --name mcp-gateway-eks-cluster
          
          # Check for available nodes
          echo "Checking for available nodes..."
          kubectl get nodes
          
          # Wait for nodes to be ready if needed
          echo "Waiting for nodes to be ready..."
          kubectl wait --for=condition=ready nodes --all --timeout=300s || echo "Not all nodes are ready yet, but continuing..."

      - name: Deploy to EKS Fargate
        run: |
          # Create namespace if it doesn't exist
          kubectl create namespace mcp-gateway --dry-run=client -o yaml | kubectl apply -f -
          
          # Label namespace for Fargate
          kubectl label namespace mcp-gateway app=mcp-gateway-registry --overwrite=true
          
          # Deploy the application to Fargate
          cat <<EOF | kubectl apply -f -
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: mcp-gateway-registry
            namespace: mcp-gateway
          spec:
            replicas: 2
            selector:
              matchLabels:
                app: mcp-gateway-registry
            template:
              metadata:
                labels:
                  app: mcp-gateway-registry
              spec:
                containers:
                - name: mcp-gateway-registry
                  image: ${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY:${{ github.sha }}
                  ports:
                  - containerPort: 7860
                  env:
                  - name: ADMIN_USER
                    value: "admin"
                  - name: ADMIN_PASSWORD
                    value: "${{ secrets.ADMIN_PASSWORD || '123' }}"
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: mcp-gateway-registry
            namespace: mcp-gateway
          spec:
            selector:
              app: mcp-gateway-registry
            ports:
            - port: 80
              targetPort: 7860
            type: NodePort
          EOF
          
          echo "Deployment to Fargate initiated. Pods will run on AWS Fargate."

      - name: Get EKS Service External IP/Hostname
        id: get-service-ip
        run: |
          echo "Waiting for service to get external address..."
          external_address=""
          count=0
          max_attempts=30
          
          while [ -z "$external_address" ] && [ $count -lt $max_attempts ]; do
            echo "Attempt $count: Waiting for external address..."
            external_address=$(kubectl get svc mcp-gateway-registry -n mcp-gateway -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || echo "")
            
            # If hostname is empty, try IP (depends on cloud provider)
            if [ -z "$external_address" ]; then
              external_address=$(kubectl get svc mcp-gateway-registry -n mcp-gateway -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || echo "")
            fi
            
            if [ -z "$external_address" ]; then
              sleep 10
              count=$((count+1))
            fi
          done
          
          if [ -z "$external_address" ]; then
            echo "Could not get external address after $max_attempts attempts. Using placeholder."
            external_address="placeholder.example.com"
          fi
          
          echo "SERVICE_ADDRESS=$external_address" >> $GITHUB_ENV
          echo "Service address: $external_address"
          
          # Check pod status
          echo "Checking pod status..."
          kubectl get pods -n mcp-gateway

      - name: Configure AWS credentials for Route53 account
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: arn:aws:iam::836966548078:role/GitHubActionsRoute53Role
          aws-region: us-east-1

      - name: Update Route53 record
        run: |
          aws route53 change-resource-record-sets --hosted-zone-id Z00677396IM7D3SZ8WND --change-batch '{
            "Changes": [
              {
                "Action": "UPSERT",
                "ResourceRecordSet": {
                  "Name": "mcp-test.v2n2x.com",
                  "Type": "CNAME",
                  "TTL": 300,
                  "ResourceRecords": [
                    {
                      "Value": "${{ env.SERVICE_ADDRESS }}"
                    }
                  ]
                }
              }
            ]
          }'
          
      - name: Deployment summary
        run: |
          echo "Workflow completed successfully!"
          echo "Image built and pushed to: ${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY:${{ github.sha }}"
          echo "Route53 record updated: mcp-test.v2n2x.com -> ${{ env.SERVICE_ADDRESS }}"
          echo ""
          echo "Next steps:"
          echo "1. Create an EKS cluster"
          echo "2. Update the workflow to use your EKS cluster name"
          echo "3. Re-enable the EKS deployment steps"