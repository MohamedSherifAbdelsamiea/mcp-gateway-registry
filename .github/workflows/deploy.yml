name: Deploy to EKS and Update Route53

on:
  push:
    branches:
      - Adding-uvx-support

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials for EKS account
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: arn:aws:iam::338293206254:role/GitHubActionsEKSRole
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build and push image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: mcp-gateway-registry
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # Repository already created manually: 338293206254.dkr.ecr.us-east-1.amazonaws.com/mcp-gateway-registry
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Configure kubectl with AWS CLI
        run: |
          # Create a kubeconfig file manually
          CLUSTER_NAME="mcp-gateway-eks-cluster"
          REGION="us-east-1"
          
          # Get cluster endpoint
          ENDPOINT=$(aws eks describe-cluster --name $CLUSTER_NAME --query "cluster.endpoint" --output text)
          
          # Get certificate authority
          CA_DATA=$(aws eks describe-cluster --name $CLUSTER_NAME --query "cluster.certificateAuthority.data" --output text)
          
          # Create kubeconfig file
          cat > kubeconfig << EOF
          apiVersion: v1
          clusters:
          - cluster:
              server: $ENDPOINT
              certificate-authority-data: $CA_DATA
            name: $CLUSTER_NAME
          contexts:
          - context:
              cluster: $CLUSTER_NAME
              user: aws
            name: $CLUSTER_NAME
          current-context: $CLUSTER_NAME
          kind: Config
          preferences: {}
          users:
          - name: aws
            user:
              exec:
                apiVersion: client.authentication.k8s.io/v1beta1
                command: aws
                args:
                  - --region
                  - $REGION
                  - eks
                  - get-token
                  - --cluster-name
                  - $CLUSTER_NAME
          EOF
          
          # Set KUBECONFIG environment variable
          echo "KUBECONFIG=$(pwd)/kubeconfig" >> $GITHUB_ENV
          
          # Check for available nodes
          echo "Checking for available nodes..."
          kubectl --kubeconfig=$(pwd)/kubeconfig get nodes
          
          # Wait for nodes to be ready if needed
          echo "Waiting for nodes to be ready..."
          kubectl --kubeconfig=$(pwd)/kubeconfig wait --for=condition=ready nodes --all --timeout=300s || echo "Not all nodes are ready yet, but continuing..."

      - name: Deploy to EKS Fargate
        run: |
          # Create namespace if it doesn't exist
          kubectl --kubeconfig=$(pwd)/kubeconfig create namespace mcp-gateway --dry-run=client -o yaml | kubectl --kubeconfig=$(pwd)/kubeconfig apply -f -
          
          # Label namespace for Fargate
          kubectl --kubeconfig=$(pwd)/kubeconfig label namespace mcp-gateway app=mcp-gateway-registry --overwrite=true
          
          # Deploy the application to Fargate
          cat <<EOF | kubectl --kubeconfig=$(pwd)/kubeconfig apply -f -
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: mcp-gateway-registry
            namespace: mcp-gateway
          spec:
            replicas: 2
            selector:
              matchLabels:
                app: mcp-gateway-registry
            template:
              metadata:
                labels:
                  app: mcp-gateway-registry
              spec:
                containers:
                - name: mcp-gateway-registry
                  image: ${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY:${{ github.sha }}
                  ports:
                  - containerPort: 7860
                  env:
                  - name: ADMIN_USER
                    value: "admin"
                  - name: ADMIN_PASSWORD
                    value: "${{ secrets.ADMIN_PASSWORD || '123' }}"
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: mcp-gateway-registry
            namespace: mcp-gateway
          spec:
            selector:
              app: mcp-gateway-registry
            ports:
            - port: 80
              targetPort: 7860
            type: NodePort
          EOF
          
          echo "Deployment to Fargate initiated. Pods will run on AWS Fargate."

      - name: Get EKS Service NodePort
        id: get-service-nodeport
        run: |
          echo "Getting NodePort for the service..."
          NODE_PORT=$(kubectl --kubeconfig=$(pwd)/kubeconfig get svc mcp-gateway-registry -n mcp-gateway -o jsonpath='{.spec.ports[0].nodePort}')
          
          echo "Service NodePort: $NODE_PORT"
          
          # For NodePort services, we need to use the cluster endpoint with the node port
          CLUSTER_ENDPOINT=$(aws eks describe-cluster --name mcp-gateway-eks-cluster --query "cluster.endpoint" --output text | sed 's|https://||')
          
          # Set a placeholder service address using the cluster endpoint and node port
          external_address="$CLUSTER_ENDPOINT:$NODE_PORT"
          echo "SERVICE_ADDRESS=$external_address" >> $GITHUB_ENV
          echo "Service address: $external_address"
          
          # Check pod status
          echo "Checking pod status..."
          kubectl --kubeconfig=$(pwd)/kubeconfig get pods -n mcp-gateway

      - name: Configure AWS credentials for Route53 account
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: arn:aws:iam::836966548078:role/GitHubActionsRoute53Role
          aws-region: us-east-1

      - name: Update Route53 record
        run: |
          aws route53 change-resource-record-sets --hosted-zone-id Z00677396IM7D3SZ8WND --change-batch '{
            "Changes": [
              {
                "Action": "UPSERT",
                "ResourceRecordSet": {
                  "Name": "mcp-test.v2n2x.com",
                  "Type": "CNAME",
                  "TTL": 300,
                  "ResourceRecords": [
                    {
                      "Value": "${{ env.SERVICE_ADDRESS }}"
                    }
                  ]
                }
              }
            ]
          }'
          
      - name: Deployment summary
        run: |
          echo "Workflow completed successfully!"
          echo "Image built and pushed to: ${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY:${{ github.sha }}"
          echo "Route53 record updated: mcp-test.v2n2x.com -> ${{ env.SERVICE_ADDRESS }}"
          echo ""
          echo "Next steps:"
          echo "1. Create an EKS cluster"
          echo "2. Update the workflow to use your EKS cluster name"
          echo "3. Re-enable the EKS deployment steps"